<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Explorador Registros GBIF</title>

  <!-- CSS GLOBAL -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

  <!-- SOLO estilos del mapa -->
  <style>
    #map { height: 100vh; }

    #buscador-container {
      position: absolute;
      top: 80px; /* 🔥 importante para no tapar header */
      left: 50px;
      z-index: 1000;
      background: white;
      padding: 8px;
      border-radius: 8px;
      width: 260px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

  <!-- HEADER UNIFICADO -->
  <header class="main-header">
    <img src="assets/logo.png" class="logo">
    <nav>
      <a href="index.html">Inicio</a>
      <a href="datasets.html">Datasets</a>
      <a href="map.html">Mapa</a>
    </nav>
  </header>

  <!-- BUSCADOR -->
  <div id="buscador-container">
    <div class="search-box">
      <input type="text" id="buscador" placeholder="Buscar taxón..." />
      <button id="btnBuscar">🔍</button>
    </div>

    <div id="sugerencias"></div>
    <div id="estado"></div>
  </div>

  <!-- MAPA -->
  <div id="map"></div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

  <script src="js/explorar_GBIF.js"></script>

</body>
</html>
