<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Explorador Registros GBIF</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 100vh; }

    /* 🔍 Buscador compacto */
    #buscador-container {
      position: absolute;
      top: 10px;
      left: 50px;
      z-index: 1000;
      background: white;
      padding: 8px;
      border-radius: 8px;
      width: 260px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    .search-box {
      display: flex;
    }

    #buscador {
      flex: 1;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px 0 0 4px;
      outline: none;
    }

    #btnBuscar {
      width: 40px;
      border: none;
      background: #2c7be5;
      color: white;
      border-radius: 0 4px 4px 0;
      cursor: pointer;
    }

    #btnBuscar:hover {
      background: #1a5fd1;
    }

    #sugerencias {
      background: white;
      border: 1px solid #ccc;
      max-height: 150px;
      overflow-y: auto;
      margin-top: 5px;
    }

    .item-sugerencia {
      padding: 5px;
      cursor: pointer;
    }

    .item-sugerencia:hover {
      background: #f0f0f0;
    }

    #estado {
      margin-top: 5px;
      font-size: 12px;
    }
  </style>
</head>
 <!-- 🔝 Header institucional -->
  <header class="header">
    <div class="header-content">
      <h2>Portal de Datos Instituto Milenio BASE</h2>
      <nav>
        <a href="index.html">Inicio</a>
        <a href="datasets.html">Datasets</a>
        <a href="map.html">Mapa</a>
      </nav>
    </div>
  </header>
<body>

  <!-- 🔍 Buscador -->
  <div id="buscador-container">
    <div class="search-box">
      <input type="text" id="buscador" placeholder="Buscar taxón..." />
      <button id="btnBuscar">🔍</button>
    </div>

    <div id="sugerencias"></div>
    <div id="estado"></div>
  </div>

  <!-- 🗺️ Mapa -->
  <div id="map"></div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

  <!-- Tu JS -->
  <script src="js/explorar_GBIF.js"></script>

</body>
</html>
