<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Explorador Registros GBIF</title>

  <!-- CSS GLOBAL -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <!-- MarkerCluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

  <!-- SOLO estilos del mapa -->
  <style>
    #map { height: 100vh; }

    #buscador-container {
      position: absolute;
      top: 100px; 
      left: 50px;
      z-index: 1000;
      background: white;
      padding: 8px;
      border-radius: 8px;
      width: 260px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

  <!-- HEADER UNIFICADO -->
<header class="header">
  <div class="header-content">
    
    <div class="logo-title">
      <img src="assets/logo.png" alt="Logo BASE" class="logo">
      <h2>Portal de Datos Instituto Milenio BASE</h2>
    </div>
      <nav>
        <a href="index.html">Inicio</a>
        <a href="datasets.html">Datasets</a>
        <a href="map.html">Explorar Registros GBIF</a>
      </nav>
    </div>
  </header>


  <!-- BUSCADOR -->
  <div id="buscador-container">
    <div class="search-box">
      <input type="text" id="buscador" placeholder="Buscar taxón..." />
      <button id="btnBuscar">🔍</button>
      <button id="btnLimpiar">Limpiar</button>
    </div>

    <div id="sugerencias"></div>
    <div id="estado"></div>
  </div>

  <!-- MAPA -->
  <div id="map"></div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

  <script src="js/explorar_GBIF.js"></script>

</body>
 <footer class="footer">
  <div class="footer-content">

    <!-- Logo -->
    <div class="footer-logo">
      <img src="assets/base_anid_logo.png" alt="Instituto BASE">
    </div>

    <!-- Links -->
    <div class="footer-links">
      <h4>Enlaces de interés</h4>
      <ul>
        <li><a href="https://www.gbif.org" target="_blank">GBIF</a></li>
        <li><a href="https://zenodo.org" target="_blank">Zenodo</a></li>
        <li><a href="https://www.institutobase.cl" target="_blank">Instituto BASE</a></li>
      </ul>
    </div>

  </div>

  <div class="footer-bottom">
    <p>© 2026 Instituto Milenio BASE</p>
  </div>
</footer>
</html>
